    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "Drivflow",
      "url": "https://drivflow.fr/",
      "applicationCategory": "BusinessApplication",
      "operatingSystem": "Web",
      "inLanguage": "fr-FR",
      "description": "Logiciel de gestion et de rentabilité pour auto-écoles, centres taxi, VTC, VMDTR et formateurs indépendants : élèves, planning, devis, factures, paiements et rentabilité.",
      "featureList": [
        "Gestion des élèves",
        "Planning avec détection des conflits",
        "Devis et factures",
        "Suivi des paiements et des impayés",
        "Rentabilité par élève, formateur et véhicule"
      ],
      "offers": {
        "@type": "AggregateOffer",
        "priceCurrency": "EUR",
        "lowPrice": "49",
        "highPrice": "149",
        "offerCount": "3",
        "offers": [
          { "@type": "Offer", "name": "Solo", "price": "49", "priceCurrency": "EUR", "description": "Formateur indépendant — par mois" },
          { "@type": "Offer", "name": "Pro", "price": "89", "priceCurrency": "EUR", "description": "Petit centre de formation — par mois" },
          { "@type": "Offer", "name": "Centre", "price": "149", "priceCurrency": "EUR", "description": "Structure organisée — par mois" }
        ]
      },
      "publisher": {
        "@type": "Organization",
        "name": "Drivflow",
        "url": "https://drivflow.fr/",
        "logo": "https://drivflow.fr/og-drivflow.jpg"
      }
    }
    </script>

    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "À qui s'adresse Drivflow ?",
          "acceptedAnswer": { "@type": "Answer", "text": "Aux formateurs indépendants, auto-écoles, centres Taxi, VTC et VMDTR, ainsi qu'aux structures mixtes multi-activités." }
        },
        {
          "@type": "Question",
          "name": "L'application est-elle utilisable sur mobile ?",
          "acceptedAnswer": { "@type": "Answer", "text": "Oui. Drivflow est conçu mobile-first pour être utilisé rapidement entre deux séances, sur smartphone ou tablette." }
        },
        {
          "@type": "Question",
          "name": "Peut-on gérer plusieurs formateurs et véhicules ?",
          "acceptedAnswer": { "@type": "Answer", "text": "Oui. Selon votre plan, vous gérez plusieurs formateurs, véhicules et activités. Le planning détecte automatiquement les conflits." }
        },
        {
          "@type": "Question",
          "name": "Comment fonctionne le suivi des paiements ?",
          "acceptedAnswer": { "@type": "Answer", "text": "Drivflow suit les paiements facture par facture, détecte les impayés et les paiements partiels, et vous alerte en cas de retard." }
        },
        {
          "@type": "Question",
          "name": "Comment est calculée la rentabilité ?",
          "acceptedAnswer": { "@type": "Answer", "text": "À partir du CA généré par élève, formateur ou véhicule, comparé aux coûts réels (heures, charges véhicule, etc.)." }
        },
        {
          "@type": "Question",
          "name": "Comment demander une démo ?",
          "acceptedAnswer": { "@type": "Answer", "text": "Cliquez sur « Demander une démo » et remplissez le formulaire. Nous vous recontacterons sous 48 heures." }
        }
      ]
    }
    </script>
